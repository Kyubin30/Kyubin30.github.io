<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEAKER</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body {
      background: var(--forest);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    img.logo { width: 72px; margin-bottom: 20px; }
    h1 { font-size: 40px; font-weight: 900; letter-spacing: 6px; margin-bottom: 10px; }
    p { font-size: 15px; color: rgba(250,243,233,0.55); margin-bottom: 6px; }
    .links { margin-top: 48px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .links a {
      color: var(--marigold);
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255,178,58,0.4);
      border-radius: 8px;
      padding: 10px 22px;
    }
    .links a:hover { background: rgba(255,178,58,0.08); opacity: 1; }
  </style>
</head>
<body>
  <img class="logo" src="../assets/peaker_logo_white.png" alt="PEAKER">
  <h1>PEAKER</h1>
  <p>등산 기록 & 커뮤니티 앱</p>
  <p>Hiking tracking & community app</p>
  <div class="links">
    <a href="privacy.html">개인정보 처리방침</a>
    <a href="terms.html">서비스 이용약관</a>
  </div>
</body>
</html>
